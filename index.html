<!<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#050505">

<link rel="manifest" href="manifest.json">

<title>Ryzen Voss v2.1</title>


<style>
    .history-panel{

display:none;

margin-top:20px;

padding:20px;

border-radius:20px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(20px);

}


.history-item{

display:flex;

justify-content:space-between;

padding:12px;

margin:8px 0;

border-radius:15px;

background:
rgba(0,0,0,.25);

}


.history-panel button{

width:100%;

margin-top:15px;

height:40px;

border:none;

border-radius:15px;

background:#ef4444;

color:white;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}


body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top,#312e81,#020617);

color:white;

overflow:hidden;

}


/* Stars background */

.stars{

position:fixed;
inset:0;

background-image:
radial-gradient(white 1px,transparent 1px);

background-size:80px 80px;

opacity:.35;

animation:
moveStars 25s linear infinite;

}


@keyframes moveStars{

from{
transform:translateY(0);
}

to{
transform:translateY(-120px);
}

}



.app{

width:95%;

max-width:430px;

padding:25px;

border-radius:30px;


background:
rgba(255,255,255,.09);


backdrop-filter:
blur(25px);


border:
1px solid rgba(255,255,255,.15);


box-shadow:
0 0 40px rgba(139,92,246,.4);

position:relative;

z-index:2;

}



.moon{

position:absolute;

right:25px;
top:25px;

width:60px;
height:60px;

border-radius:50%;

background:
linear-gradient(135deg,#fff,#94a3b8);


box-shadow:
0 0 35px white;

}



.logo{

text-align:center;

font-size:32px;

font-weight:900;

letter-spacing:2px;

}


.tag{

text-align:center;

opacity:.7;

margin-top:5px;

}



.menu{

display:flex;

gap:10px;

margin:25px 0;

}


.menu button{

flex:1;

height:45px;

border:none;

border-radius:15px;

background:
rgba(255,255,255,.12);

color:white;

font-size:15px;

}



.display{

background:
rgba(0,0,0,.25);

padding:20px;

border-radius:22px;

min-height:110px;

}


#expression{

text-align:right;

opacity:.6;

font-size:18px;

}


#result{

text-align:right;

font-size:40px;

font-weight:800;

margin-top:10px;

}


.keys{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:12px;

margin-top:20px;

}



.key{

height:65px;

border:none;

border-radius:20px;

background:
rgba(255,255,255,.12);

color:white;

font-size:22px;

}



.key:active{

transform:scale(.92);

}



.operator{

background:
linear-gradient(135deg,#8b5cf6,#ec4899);

}



.equal{

grid-column:span 2;

background:
linear-gradient(135deg,#22c55e,#06b6d4);

}



</style>

</head>


<body>


<div class="stars"></div>


<div class="app">


<div class="moon"></div>


<div class="logo">
Ryzen Voss
</div>


<div class="tag">
Calculator v2.1
</div>


<div class="menu">

<button id="historyBtn">
📜 History
</button>
    <div id="historyPanel" class="history-panel">

<h2>📜 History</h2>

<div id="historyList"></div>

<button id="clearHistory">
🗑 Clear
</button>

    </div>

<button>
Themes
</button>

</div>


<div class="display">

<div id="expression"></div>

<div id="result">
0
</div>

</div>


<div class="keys">
    <button class="key operator" data-value="C">
C
</button>

<button class="key operator" data-value="⌫">
⌫
</button>

<button class="key operator" data-value="%">
%
</button>

<button class="key operator" data-value="/">
÷
</button>


<button class="key" data-value="7">
7
</button>

<button class="key" data-value="8">
8
</button>

<button class="key" data-value="9">
9
</button>

<button class="key operator" data-value="*">
×
</button>


<button class="key" data-value="4">
4
</button>

<button class="key" data-value="5">
5
</button>

<button class="key" data-value="6">
6
</button>

<button class="key operator" data-value="-">
−
</button>


<button class="key" data-value="1">
1
</button>

<button class="key" data-value="2">
2
</button>

<button class="key" data-value="3">
3
</button>

<button class="key operator" data-value="+">
+
</button>


<button class="key" data-value="0">
0
</button>

<button class="key" data-value=".">
.
</button>

<button class="key equal" data-value="=">
=
</button>


</div>


<div class="menu">

<button id="copyBtn">
Copy Result
</button>

<button id="installBtn">
Install App
</button>

</div>


</div>


<script>
    const historyBtn =
document.getElementById("historyBtn");

const historyPanel =
document.getElementById("historyPanel");

const historyList =
document.getElementById("historyList");


historyBtn.onclick=()=>{

historyPanel.style.display =
"block";

showHistory();

};
function showHistory(){

historyList.innerHTML="";

history.forEach(item=>{

historyList.innerHTML += `

<div class="history-item">
<span>${item.text}</span>
<b>${item.result}</b>
</div>

`;

});

}
};


let current="";


const result =
document.getElementById("result");


const expression =
document.getElementById("expression");


const keys =
document.querySelectorAll(".key");


const copyBtn =
document.getElementById("copyBtn");


const installBtn =
document.getElementById("installBtn");



keys.forEach(key=>{

key.onclick=()=>{

let value =
key.dataset.value;


handle(value);

};

});



function handle(value){


if(value==="C"){

current="";

}


else if(value==="⌫"){

current =
current.slice(0,-1);

}


else if(value==="="){

calculate();

}


else{

current += value;

}



expression.innerText =
current;


result.innerText =
current || "0";


}



function calculate(){

try{


let answer =
Function(
"return "+current
)();


result.innerText =
answer;


current =
String(answer);
    
    addHistory();



}

catch{


result.innerText =
"Error";

}


}

// Theme System

const themes = {

cosmic:{
background:
"radial-gradient(circle at top,#312e81,#020617)",
glow:"#8b5cf6"
},


cyber:{
background:
"radial-gradient(circle at top,#164e63,#001018)",
glow:"#06b6d4"
},


aurora:{
background:
"radial-gradient(circle at top,#065f46,#022c22)",
glow:"#10b981"
},


flame:{
background:
"radial-gradient(circle at top,#9a3412,#1c0800)",
glow:"#f97316"
},


arctic:{
background:
"radial-gradient(circle at top,#e0f2fe,#64748b)",
glow:"#0284c7"
},


royal:{
background:
"radial-gradient(circle at top,#581c87,#1e1038)",
glow:"#c084fc"
},


ocean:{
background:
"radial-gradient(circle at top,#0369a1,#001f3f)",
glow:"#38bdf8"
},


amoled:{
background:
"#000000",
glow:"#ffffff"
}

};



function setTheme(name){

let theme =
themes[name];


if(!theme)
return;


document.body.style.background =
theme.background;


document.querySelector(".app")
.style.boxShadow =
"0 0 45px "+theme.glow;


localStorage.setItem(
"rv_theme",
name
);


}




let savedTheme =
localStorage.getItem(
"rv_theme"
);


if(savedTheme){

setTheme(savedTheme);

}



// Theme button

const themeButton =
document.querySelector(
".menu button:nth-child(2)"
);


themeButton.onclick=()=>{


let choice =
prompt(
"Choose Theme:\n\n1 Cosmic Night\n2 Cyber City\n3 Aurora\n4 Solar Flame\n5 Arctic Glass\n6 Royal Galaxy\n7 Ocean Deep\n8 AMOLED"
);



const themeList=[

"cosmic",
"cyber",
"aurora",
"flame",
"arctic",
"royal",
"ocean",
"amoled"

];



let selected =
themeList[Number(choice)-1];


if(selected){

setTheme(selected);

}


};



// History

let history =
JSON.parse(
localStorage.getItem("rv_history")
)||[];



function addHistory(){

if(!current)
return;


history.unshift({

text:expression.innerText,
result:result.innerText

});


if(history.length>50){

history.pop();

}


localStorage.setItem(
"rv_history",
JSON.stringify(history)
);


}



// Save after calculation

const oldCalculate =
calculate;


calculate=function(){

oldCalculate();

addHistory();

};



// Copy button

copyBtn.onclick=()=>{


navigator.clipboard.writeText(
result.innerText
);


copyBtn.innerText =
"Copied ✓";


setTimeout(()=>{

copyBtn.innerText =
"Copy Result";

},1200);


};
// PWA Install System

let deferredPrompt = null;


window.addEventListener(
"beforeinstallprompt",
(event)=>{

event.preventDefault();

deferredPrompt = event;

installBtn.style.display="block";

});



installBtn.onclick = async()=>{


if(!deferredPrompt){

installBtn.innerText =
"Not Available";

setTimeout(()=>{

installBtn.innerText =
"Install App";

},1500);

return;

}



deferredPrompt.prompt();


const choice =
await deferredPrompt.userChoice;



if(choice.outcome==="accepted"){

installBtn.style.display="none";

}


deferredPrompt=null;


};



// Hide button if already installed

window.addEventListener(
"appinstalled",
()=>{

installBtn.style.display="none";

});



// Keyboard Support

document.addEventListener(
"keydown",
(e)=>{


let key =
e.key;



if(
(key>="0" && key<="9") ||
["+","-","*","/","."].includes(key)
){

handle(key);

}



if(key==="Enter"){

calculate();

}



if(key==="Backspace"){

handle("⌫");

}



if(key==="Escape"){

handle("C");

}



});



// Service Worker

if(
"serviceWorker" in navigator
){

window.addEventListener(
"load",
()=>{


navigator.serviceWorker.register(
"service-worker.js"
);


});


}



// Final display

result.innerText="0";


</script>


</body>

</html>
